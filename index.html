<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지뢰찾기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 16px;
    letter-spacing: 2px;
    color: #e94560;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .controls button {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: bold;
    background: #16213e;
    color: #eee;
    border: 1px solid #0f3460;
    transition: background 0.2s;
  }
  .controls button:hover, .controls button.active {
    background: #e94560;
    color: #fff;
    border-color: #e94560;
  }
  .info-bar {
    display: flex;
    gap: 30px;
    margin-bottom: 14px;
    font-size: 1.1rem;
    background: #16213e;
    padding: 10px 28px;
    border-radius: 10px;
    border: 1px solid #0f3460;
    align-items: center;
  }
  .info-bar span { display: flex; align-items: center; gap: 6px; }
  .reset-btn {
    background: none;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .reset-btn:hover { transform: scale(1.2); }
  #board {
    display: inline-grid;
    gap: 2px;
    background: #0f3460;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    user-select: none;
  }
  .cell {
    width: 34px;
    height: 34px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.1s, transform 0.05s;
    background: #1a1a2e;
    border: 1px solid #0f3460;
    position: relative;
  }
  .cell.hidden {
    background: #16213e;
    border: 1px solid #2a2a5e;
  }
  .cell.hidden:hover {
    background: #1f1f4e;
    transform: scale(1.05);
  }
  .cell.revealed {
    background: #0d1117;
    border: 1px solid #0f3460;
    cursor: default;
  }
  .cell.flagged { background: #16213e; border: 1px solid #2a2a5e; }
  .cell.mine-hit { background: #e94560 !important; }
  .cell.mine-show { background: #1a1a2e; }
  .n1 { color: #58a6ff; }
  .n2 { color: #3fb950; }
  .n3 { color: #f85149; }
  .n4 { color: #8b949e; }
  .n5 { color: #ffa657; }
  .n6 { color: #79c0ff; }
  .n7 { color: #d2a8ff; }
  .n8 { color: #e3b341; }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .overlay-box {
    background: #16213e;
    border: 2px solid #e94560;
    border-radius: 16px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(233,69,96,0.3);
  }
  .overlay-box h2 { font-size: 2rem; margin-bottom: 10px; }
  .overlay-box p { color: #aaa; margin-bottom: 20px; }
  .overlay-box button {
    padding: 10px 30px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
  }
  .overlay-box button:hover { background: #c73652; }
</style>
</head>
<body>

<h1>💣 지뢰찾기</h1>

<div class="controls">
  <button onclick="setDifficulty('easy')" id="btn-easy">초급 (9×9)</button>
  <button onclick="setDifficulty('medium')" id="btn-medium" class="active">중급 (16×16)</button>
  <button onclick="setDifficulty('hard')" id="btn-hard">고급 (30×16)</button>
</div>

<div class="info-bar">
  <span>💣 <span id="mine-count">0</span></span>
  <button class="reset-btn" onclick="startGame()" title="다시 시작">🙂</button>
  <span>⏱ <span id="timer">0</span>s</span>
</div>

<div id="board"></div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="overlay-title"></h2>
    <p id="overlay-msg"></p>
    <button onclick="closeOverlay()">다시 시작</button>
  </div>
</div>

<script>
const DIFFICULTIES = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 },
};

let cfg = DIFFICULTIES.medium;
let board = [], revealed = [], flagged = [], mineSet = new Set();
let gameOver = false, firstClick = true;
let timerInterval = null, seconds = 0;
let difficulty = 'medium';

function setDifficulty(d) {
  difficulty = d;
  cfg = DIFFICULTIES[d];
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + d).classList.add('active');
  startGame();
}

function startGame() {
  clearInterval(timerInterval);
  seconds = 0;
  document.getElementById('timer').textContent = '0';
  gameOver = false;
  firstClick = true;

  const { rows, cols, mines } = cfg;
  board = Array.from({ length: rows }, () => Array(cols).fill(0));
  revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
  flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
  mineSet = new Set();

  document.getElementById('mine-count').textContent = mines;
  renderBoard();
  document.getElementById('overlay').classList.remove('show');
  document.querySelector('.reset-btn').textContent = '🙂';
}

function placeMines(skipR, skipC) {
  const { rows, cols, mines } = cfg;
  const skip = new Set();
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = skipR + dr, nc = skipC + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
        skip.add(nr * cols + nc);
    }
  while (mineSet.size < mines) {
    const idx = Math.floor(Math.random() * rows * cols);
    if (!skip.has(idx)) mineSet.add(idx);
  }
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      board[r][c] = mineSet.has(r * cfg.cols + c) ? -1 : 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (board[r][c] !== -1)
        board[r][c] = countAdj(r, c);
}

function countAdj(r, c) {
  let cnt = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols && mineSet.has(nr * cfg.cols + nc))
        cnt++;
    }
  return cnt;
}

function renderBoard() {
  const { rows, cols } = cfg;
  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 34px)`;
  boardEl.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell hidden';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', onLeftClick);
      cell.addEventListener('contextmenu', onRightClick);
      boardEl.appendChild(cell);
    }
  }
}

function getCellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function updateCell(r, c) {
  const cell = getCellEl(r, c);
  if (!cell) return;
  cell.className = 'cell';
  cell.textContent = '';

  if (flagged[r][c]) {
    cell.classList.add('hidden', 'flagged');
    cell.textContent = '🚩';
  } else if (!revealed[r][c]) {
    cell.classList.add('hidden');
  } else {
    cell.classList.add('revealed');
    const val = board[r][c];
    if (val === -1) {
      cell.textContent = '💣';
    } else if (val > 0) {
      cell.textContent = val;
      cell.classList.add('n' + val);
    }
  }
}

function onLeftClick(e) {
  if (gameOver) return;
  const r = +this.dataset.r, c = +this.dataset.c;
  if (flagged[r][c] || revealed[r][c]) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = seconds;
    }, 1000);
  }

  if (board[r][c] === -1) {
    revealed[r][c] = true;
    updateCell(r, c);
    getCellEl(r, c).classList.add('mine-hit');
    endGame(false);
    return;
  }

  flood(r, c);
  checkWin();
}

function onRightClick(e) {
  e.preventDefault();
  if (gameOver) return;
  const r = +this.dataset.r, c = +this.dataset.c;
  if (revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  updateCell(r, c);
  const remaining = cfg.mines - flagged.flat().filter(Boolean).length;
  document.getElementById('mine-count').textContent = remaining;
}

function flood(r, c) {
  if (r < 0 || r >= cfg.rows || c < 0 || c >= cfg.cols) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  updateCell(r, c);
  if (board[r][c] === 0) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        if (dr !== 0 || dc !== 0) flood(r + dr, c + dc);
  }
}

function checkWin() {
  const { rows, cols, mines } = cfg;
  let unrevealed = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealed[r][c]) unrevealed++;
  if (unrevealed === mines) endGame(true);
}

function endGame(win) {
  gameOver = true;
  clearInterval(timerInterval);
  document.querySelector('.reset-btn').textContent = win ? '😎' : '😵';

  if (!win) {
    // reveal all mines
    for (let r = 0; r < cfg.rows; r++)
      for (let c = 0; c < cfg.cols; c++)
        if (mineSet.has(r * cfg.cols + c) && !flagged[r][c]) {
          revealed[r][c] = true;
          updateCell(r, c);
        }
  }

  setTimeout(() => {
    const overlay = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = win ? '🎉 성공!' : '💥 실패!';
    document.getElementById('overlay-msg').textContent = win
      ? `${seconds}초 만에 클리어했습니다!`
      : '지뢰를 밟았습니다. 다시 도전해보세요!';
    overlay.classList.add('show');
  }, win ? 300 : 600);
}

function closeOverlay() {
  startGame();
}

startGame();
</script>
</body>
</html>
